name: ✅ Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  check-tag:
    name: Check Tag Branch
    runs-on: ubuntu-24.04
    outputs:
      is_merged: ${{ steps.check.outputs.is_merged }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag is merged to main
        id: check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor HEAD FETCH_HEAD; then
            echo "Tag is merged to main. Proceeding with release."
            echo "is_merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag is not merged to main branch. Skipping release."
            echo "is_merged=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: ✅ Validate and Build
    needs: check-tag
    if: needs.check-tag.outputs.is_merged == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev cmake

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Verify code formats
        run: cargo fmt --all -- --check

      - name: Verify clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic -A clippy::missing_errors_doc

      - name: Run tests
        run: cargo test --all-features

  create-release:
    name: Create GitHub Release
    needs: [check-tag, validate]
    if: needs.check-tag.outputs.is_merged == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  publish-crates:
    name: Publish to crates.io
    needs: [check-tag, validate]
    if: needs.check-tag.outputs.is_merged == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev cmake

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "=== ERROR: MISSING CRATES.IO TOKEN ==="
            echo "The GitHub secrets 'CARGO_REGISTRY_TOKEN' or 'CRATES_IO_TOKEN' are not configured."
            echo "Please go to your repository settings (Settings > Secrets and variables > Actions)"
            echo "and create a repository secret with your crates.io API token."
            exit 1
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
